<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Mark Your Birthplace</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a1620 0%, #1a2a3a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .form-container {
            max-width: 550px;
            width: 100%;
            background: #0f1a24;
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }

        h1 {
            font-size: 1.8rem;
            text-align: center;
            color: #00d4ff;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #a0b0c0;
            margin-bottom: 28px;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #e0e0e0;
            font-weight: 500;
            font-size: 0.9rem;
        }

        label .required {
            color: #ff6b4a;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            background: #1a2a38;
            border: 1px solid #2a3a48;
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.2);
        }

        /* 修复下拉选项背景 */
        select option {
            background: #1a2a38;
            color: #e0e0e0;
        }

        .autocomplete-container {
            position: relative;
        }

        .suggestions-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1a2a38;
            border: 1px solid #2a3a48;
            border-radius: 12px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            margin-top: 4px;
        }

        .suggestions-list div {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #2a3a48;
            font-size: 0.9rem;
            color: #e0e0e0;
            background: #1a2a38;
        }

        .suggestions-list div:hover {
            background: #00d4ff;
            color: #0a1620;
        }

        .city-preview {
            margin-top: 10px;
            font-size: 0.8rem;
            color: #00d4ff;
            display: none;
            background: #0a141c;
            padding: 8px 12px;
            border-radius: 12px;
        }

        button {
            width: 100%;
            padding: 16px;
            background: #00d4ff;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.1rem;
            color: #0a1620;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
        }

        button:hover {
            background: #00e5ff;
            transform: translateY(-2px);
        }

        button:disabled {
            background: #2a3a48;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 0.85rem;
            display: none;
        }

        .message.success {
            background: #1a3a2a;
            color: #00ff88;
            display: block;
        }

        .message.error {
            background: #3a1a1a;
            color: #ff6b4a;
            display: block;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #0a1620;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        small {
            color: #8aa0b0;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
<div class="form-container">
    <h1>📍 Mark Your Birthplace</h1>
    <div class="subtitle">Your pin will appear on the big screen in real time</div>

    <div class="form-group">
        <label>Your Full Name <span class="required">*</span></label>
        <input type="text" id="userName" placeholder="e.g., Alex Johnson" autocomplete="off">
    </div>

    <div class="form-group">
        <label>Birth Country <span class="required">*</span></label>
        <select id="countrySelect">
            <option value="">-- Select Country --</option>
            <option value="USA">USA</option>
            <option value="Canada">Canada</option>
            <option value="UK">United Kingdom</option>
            <option value="Germany">Germany</option>
            <option value="France">France</option>
            <option value="Australia">Australia</option>
            <option value="China">China</option>
            <option value="Japan">Japan</option>
            <option value="South Korea">South Korea</option>
            <option value="India">India</option>
            <option value="Brazil">Brazil</option>
            <option value="Mexico">Mexico</option>
            <option value="Other">Other (please type below)</option>
        </select>
        <input type="text" id="otherCountry" placeholder="If 'Other', type your country here" style="margin-top: 8px; display: none;">
    </div>

    <div class="form-group">
        <label>Birthplace City <span class="required">*</span></label>
        <div class="autocomplete-container">
            <input type="text" id="cityInput" placeholder="Start typing city name... (e.g., London, Shanghai, New York)" autocomplete="off">
            <div class="suggestions-list" id="suggestionsList"></div>
        </div>
        <div class="city-preview" id="cityPreview"></div>
    </div>

    <button id="submitBtn">✨ Submit My Birthplace ✨</button>
    <div class="message" id="message"></div>
</div>

<script>
    // ============================================================
    // ✏️ 只修改这一行：粘贴你的 Google Apps Script URL
    // ============================================================
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxYmb7U9Cp1jNV3eB0x9KCUP2FWjnj6Pz8jMfUJ8yz6qsUyDfWc4saA_upxzIoVhVax/exec";
    // ============================================================

    let selectedCity = null;
    let selectedCoordinates = null;
    let searchTimeout;

    const userNameInput = document.getElementById('userName');
    const countrySelect = document.getElementById('countrySelect');
    const otherCountryInput = document.getElementById('otherCountry');
    const cityInput = document.getElementById('cityInput');
    const suggestionsList = document.getElementById('suggestionsList');
    const cityPreview = document.getElementById('cityPreview');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');

    // Show/hide "Other" country field
    countrySelect.addEventListener('change', function() {
        if (this.value === 'Other') {
            otherCountryInput.style.display = 'block';
            otherCountryInput.required = true;
        } else {
            otherCountryInput.style.display = 'none';
            otherCountryInput.required = false;
            otherCountryInput.value = '';
        }
    });

    // City search with OpenStreetMap Nominatim (English results)
    cityInput.addEventListener('input', function() {
        const query = this.value.trim();
        if (query.length < 2) {
            suggestionsList.style.display = 'none';
            selectedCity = null;
            selectedCoordinates = null;
            cityPreview.style.display = 'none';
            return;
        }

        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => searchCities(query), 300);
    });

    async function searchCities(query) {
        try {
            const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=8&addressdetails=1&accept-language=en`;
            const response = await fetch(url, {
                headers: { 'User-Agent': 'BirthplaceMapApp/1.0' }
            });
            const data = await response.json();

            if (data.length === 0) {
                suggestionsList.style.display = 'none';
                return;
            }

            suggestionsList.innerHTML = '';
            data.forEach(place => {
                const displayName = place.display_name.split(',')[0] + ', ' + place.display_name.split(',').slice(1, 3).join(',');
                const div = document.createElement('div');
                div.innerHTML = `📍 ${displayName}`;
                div.onclick = () => selectCity(place);
                suggestionsList.appendChild(div);
            });
            suggestionsList.style.display = 'block';
        } catch (error) {
            console.error('Search error:', error);
        }
    }

    function selectCity(place) {
        cityInput.value = place.display_name.split(',')[0];
        selectedCity = {
            name: place.display_name.split(',')[0],
            fullName: place.display_name,
            lat: parseFloat(place.lat),
            lon: parseFloat(place.lon)
        };
        selectedCoordinates = { lat: place.lat, lng: place.lon };

        cityPreview.innerHTML = `✅ Selected: ${place.display_name}<br>📍 Coordinates: ${parseFloat(place.lat).toFixed(4)}, ${parseFloat(place.lon).toFixed(4)}`;
        cityPreview.style.display = 'block';
        suggestionsList.style.display = 'none';
    }

    document.addEventListener('click', function(e) {
        if (!cityInput.contains(e.target) && !suggestionsList.contains(e.target)) {
            suggestionsList.style.display = 'none';
        }
    });

    submitBtn.addEventListener('click', async function() {
        const name = userNameInput.value.trim();
        let country = countrySelect.value;
        const otherCountry = otherCountryInput.value.trim();
        const city = cityInput.value.trim();

        if (country === 'Other' && otherCountry) country = otherCountry;

        if (!name) {
            showMessage('Please enter your name', 'error');
            userNameInput.focus();
            return;
        }
        if (!country || country === '-- Select Country --') {
            showMessage('Please select your birth country', 'error');
            return;
        }
        if (!city || !selectedCity) {
            showMessage('Please select a city from the dropdown suggestions', 'error');
            cityInput.focus();
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="loading"></span> Submitting...';

        const submissionData = {
            name: name,
            country: country,
            city: selectedCity.name,
            fullLocation: selectedCity.fullName,
            latitude: selectedCoordinates.lat,
            longitude: selectedCoordinates.lng,
            timestamp: new Date().toISOString()
        };

        try {
            if (GOOGLE_SCRIPT_URL && !GOOGLE_SCRIPT_URL.includes("YOUR_ID")) {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(submissionData)
                });
                showMessage('✓ Success! Your pin will appear on the big screen within 5 seconds!', 'success');
                userNameInput.value = '';
                countrySelect.value = '';
                otherCountryInput.style.display = 'none';
                cityInput.value = '';
                selectedCity = null;
                selectedCoordinates = null;
                cityPreview.style.display = 'none';
            } else {
                console.log('Demo data:', submissionData);
                showMessage('✓ Demo Mode: Your data would be saved! Configure GOOGLE_SCRIPT_URL', 'success');
            }
        } catch (error) {
            console.error('Submission error:', error);
            showMessage('Error submitting. Please try again.', 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '✨ Submit My Birthplace ✨';
        }
    });

    function showMessage(text, type) {
        messageDiv.textContent = text;
        messageDiv.className = `message ${type}`;
        setTimeout(() => {
            messageDiv.style.display = 'none';
            messageDiv.className = 'message';
        }, 4000);
    }
</script>
</body>
</html>
